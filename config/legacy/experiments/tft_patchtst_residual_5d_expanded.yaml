data:
  tickers:
    - "SPY"
    - "IWM"
    - "QQQ"
    - "IVE"
    - "IVW"
    - "XLF"
    - "XLK"
    - "XLI"
    - "XLY"
    - "XLP"
    - "XLV"
    - "XLE"
    - "XLU"
    - "TLT"
    - "IEF"
    - "SHY"
    - "HYG"
    - "LQD"
    - "GLD"
    - "UUP"
    - "^VIX"

experiments:
  run_name: "tft_patchtst_residual_5d_expanded_v1"
  models:
    - "rolling_mean"
    - "ewma"
    - "ridge"
    - "patchtst"
    - "tft"

prediction:
  target_mode: "residual"
  horizon: 1
  cumulative_horizon_rows: 5
  residual_baseline:
    type: "rolling_mean"
    window_rows: 1260

walk_forward:
  checkpoint_frequency: "M"
  train_window_rows: 1512
  min_train_rows: 1000
  min_fit_rows: 1260
  validation_window_rows: 252
  require_validation: true

sequence:
  lookback_rows: 126
  batch_size: 128
  num_workers: 0

torch:
  device: "cuda"
  max_epochs: 60
  patience: 8
  learning_rate: 0.0005
  weight_decay: 0.001
  restore_best_checkpoint: true
