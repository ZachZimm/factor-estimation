data:
  start_date: "2000-01-01"
  end_date: null
  ff5_frequency: "daily"
  tickers:
    - "SPY"
    - "VTI"
    - "IWM"
    - "QQQ"
    - "IVE"
    - "IVW"
    - "VBR"
    - "VBK"
    - "IJS"
    - "IJT"
    - "XLF"
    - "XLK"
    - "XLI"
    - "XLY"
    - "XLP"
    - "XLV"
    - "XLE"
    - "XLU"
    - "TLT"
    - "IEF"
    - "SHY"
    - "HYG"
    - "LQD"
    - "GLD"
    - "UUP"
    - "^VIX"
    - "IWN"
    - "IWO"
    - "IWD"
    - "IWF"
    - "IJR"
    - "IJH"
    - "RSP"
    - "SPHQ"
    - "VNQ"
    - "EFA"
    - "EEM"
  cache_dir: "data/cache"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  force_refresh: false

features:
  lookback_windows: [1, 2, 5, 10, 21, 63, 126]
  include_returns: true
  include_log_returns: true
  include_rolling_volatility: true
  include_rolling_volume_features: false
  include_ohlc_features: true
  include_drawdown: true
  drop_raw_ohlcv: true

target_features:
  include_lagged_targets: false
  lags: []
  rolling_windows: []
  include_rolling_mean: false
  include_rolling_volatility: false
  include_rolling_min_max: false
  include_rf_lags: false

prediction:
  horizon: 1
  target_mode: "daily"
  cumulative_horizon_rows: 1
  target_columns:
    - "Mkt-RF"
    - "SMB"
    - "HML"
    - "RMW"
    - "CMA"
    - "Mom"
  include_rf_as_feature: false
  predict_rf: false

availability:
  market_data_lag_rows: 0
  official_factor_lag_rows: 1
  recursive_factor_lags: false
  release_gap_backtest_days: [1, 2, 3, 5, 10]

output:
  force_overwrite: false

nowcast:
  output_dir: "data/nowcasts"
  run_name: "latest"
  models:
    - "elasticnet"
  primary_model: "elasticnet"
  estimate_unreleased_only: true
  save_feature_snapshot: true
  save_model_artifact: true
  save_feature_attributions: true
  min_train_rows: 1000
  train_window_rows: 2520
  backtest_step_rows: 21

attribution:
  top_n: 20

backtest:
  n_jobs: 1
  backend: "loky"
  verbose: 0

model_implied_series:
  refit_step_rows: 21
  n_jobs: 1
  backend: "loky"
  verbose: 0

feature_extraction:
  enabled: false
  method: "none"
  apply_to_models:
    - "elasticnet"
  output_prefix: "fx"
  save_transformer_artifact: false
  keep_original_features: false
  group_pca:
    scale_before_pca: true
    groups:
      market_returns:
        patterns: ["*_ret_1d", "*_log_ret_1d"]
        n_components: 8
      ohlc_intraday:
        patterns: ["*_oc_ret", "*_hl_range", "*_gap", "*_hl_range_mean_*"]
        n_components: 8
      rolling_returns:
        patterns: ["*_ret_*d"]
        n_components: 10
      rolling_volatility:
        patterns: ["*_vol_*d"]
        n_components: 10
      drawdown:
        patterns: ["*_drawdown_*d"]
        n_components: 5
      proxy_size:
        patterns: ["proxy_size_*"]
        n_components: 4
      proxy_value:
        patterns: ["proxy_value_*", "proxy_growth_*"]
        n_components: 4
      proxy_sector:
        patterns: ["proxy_sector_*"]
        n_components: 6
      proxy_risk:
        patterns: ["proxy_credit_*", "proxy_vix_*", "proxy_tlt_*"]
        n_components: 4
      proxy_global:
        patterns: ["proxy_global_*"]
        n_components: 3
      proxy_quality:
        patterns: ["proxy_quality_*"]
        n_components: 2
      proxy_realestate:
        patterns: ["proxy_realestate_*"]
        n_components: 2
      other:
        patterns: ["*"]
        n_components: 10
  pls:
    n_components: 20
    scale_features: true
    scale_targets: false
  per_target_pls:
    n_components: 10
    scale_features: true
    scale_targets: false
  clustered:
    correlation_threshold: 0.92
    max_features_for_clustering: 2000
    min_cluster_size: 2
    singleton_policy: "keep"
    representative: "mean"
    scale_before_clustering: true

sequence:
  lookback_rows: 63
  batch_size: 256
  num_workers: 0
  drop_incomplete_sequences: true

torch:
  device: "auto"
  max_epochs: 50
  patience: 8
  learning_rate: 0.0005
  weight_decay: 0.001
  gradient_clip_norm: 1.0
  mixed_precision: false
  hidden_size: 128
  dropout: 0.15
  standardize_targets: true
  save_checkpoints: false
  log_device: true
  restore_best_checkpoint: true

models:
  ridge:
    alpha: 10.0
    alpha_grid: [0.1, 1.0, 3.0, 10.0, 30.0, 100.0]
    tune_alpha: true
    validation_window_rows: 252
    scale_features: true

  elasticnet:
    alpha: 0.001
    alpha_grid: [0.0003, 0.001, 0.003, 0.01]
    l1_ratio: 0.05
    max_iter: 50000
    tol: 0.0001
    tune_alpha: true
    validation_window_rows: 252
    scale_features: true

  elasticnet_mom_override:
    alpha: 0.001
    alpha_grid: [0.0003, 0.001, 0.003, 0.01]
    l1_ratio: 0.05
    max_iter: 50000
    tol: 0.0001
    tune_alpha: true
    validation_window_rows: 252
    scale_features: true

  per_factor_elasticnet:
    alpha: 0.001
    alpha_grid: [0.0003, 0.001, 0.003, 0.01]
    l1_ratio: 0.05
    max_iter: 50000
    tol: 0.0001
    tune_alpha: true
    validation_window_rows: 252
    scale_features: true

  gradient_boosting:
    learning_rate: 0.04
    max_iter: 200
    max_leaf_nodes: 31
    min_samples_leaf: 20
    l2_regularization: 0.0
    early_stopping: false
    validation_fraction: 0.1
    n_jobs: 1

  ewma:
    spans: [5, 21, 63]
    default_span: 21

  tft:
    enabled: true
    hidden_size: 64
    n_heads: 4
    lstm_layers: 1
    dropout: 0.25

  tcn:
    channels: [64, 64, 128]
    kernel_size: 3
    dropout: 0.25

  ft_transformer:
    d_model: 64
    n_heads: 4
    num_layers: 2
    dim_feedforward: 128
    dropout: 0.25

proxy_features:
  enabled: true
  include_relative_returns: true
  include_factor_mimic_spreads: true
  include_risk_proxies: true
  rolling_windows: [5, 21, 63]

momentum_features:
  enabled: false
  signals:
    - {lookback_rows: 252, skip_rows: 21}
    - {lookback_rows: 189, skip_rows: 21}
    - {lookback_rows: 126, skip_rows: 21}
  include_individual_signals: true
  include_cross_sectional_proxy: true
  top_quantile: 0.25
  bottom_quantile: 0.25
  min_assets: 8
  rolling_windows: [5, 21, 63]

fundamentals:
  enabled: false
