task:
  mode: "nowcast"
  estimate_unreleased_only: false

prediction:
  target_columns:
    - "Mkt-RF"
    - "SMB"
    - "HML"
    - "RMW"
    - "CMA"
    - "Mom"

nowcast:
  run_name: "model_implied_series_v1"
  models:
    - "rolling_mean"
    - "ewma"
    - "ridge"
    - "elasticnet"
  primary_model: "elasticnet"
  estimate_unreleased_only: false
  save_feature_snapshot: false
  save_model_artifact: false
  save_feature_attributions: false
  min_train_rows: 1000
  train_window_rows: 2520
  backtest_step_rows: 21

model_implied_series:
  # Set to 1 for exact daily refits. The default predicts every day while
  # refitting monthly, which matches the release-gap backtest cadence.
  refit_step_rows: 21
  n_jobs: 4
  backend: "loky"
  verbose: 0

models:
  ridge:
    alpha: 10.0
    alpha_grid: [0.1, 1.0, 3.0, 10.0, 30.0, 100.0]
    tune_alpha: true
    validation_window_rows: 252
    scale_features: true
  elasticnet:
    alpha: 0.001
    alpha_grid: [0.0003, 0.001, 0.003, 0.01]
    l1_ratio: 0.05
    max_iter: 50000
    tol: 0.0001
    tune_alpha: true
    validation_window_rows: 252
    scale_features: true
