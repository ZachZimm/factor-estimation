task:
  mode: "nowcast"
  estimate_unreleased_only: true

nowcast:
  run_name: "latest"
  models:
    - "elasticnet"
  primary_model: "elasticnet"
  estimate_unreleased_only: true
  save_feature_snapshot: true
  save_model_artifact: true
  save_feature_attributions: true
  min_train_rows: 1000
  train_window_rows: 2520

models:
  elasticnet:
    alpha: 0.001
    alpha_grid: [0.0003, 0.001, 0.003, 0.01]
    l1_ratio: 0.05
    max_iter: 50000
    tol: 0.0001
    tune_alpha: true
    validation_window_rows: 252
    scale_features: true
