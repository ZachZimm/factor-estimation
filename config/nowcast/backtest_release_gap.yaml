task:
  mode: "nowcast"
  estimate_unreleased_only: false

nowcast:
  run_name: "market_only_elasticnet_backtest_v1"
  models:
    - "rolling_mean"
    - "ewma"
    - "ridge"
    - "elasticnet"
  primary_model: "elasticnet"
  min_train_rows: 1000
  train_window_rows: 2520
  backtest_step_rows: 21

models:
  ridge:
    alpha: 10.0
    alpha_grid: [0.1, 1.0, 3.0, 10.0, 30.0, 100.0]
    tune_alpha: true
    validation_window_rows: 252
    scale_features: true
  elasticnet:
    alpha: 0.001
    alpha_grid: [0.0003, 0.001, 0.003, 0.01]
    l1_ratio: 0.05
    max_iter: 50000
    tol: 0.0001
    tune_alpha: true
    validation_window_rows: 252
    scale_features: true
