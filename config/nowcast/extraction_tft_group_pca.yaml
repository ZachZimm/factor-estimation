task:
  mode: "nowcast"
  estimate_unreleased_only: false

target_features:
  include_lagged_targets: false
  lags: []
  rolling_windows: []
  include_rolling_mean: false
  include_rolling_volatility: false
  include_rolling_min_max: false
  include_rf_lags: false

availability:
  market_data_lag_rows: 0
  official_factor_lag_rows: 1
  recursive_factor_lags: false
  release_gap_backtest_days: [1, 2, 3, 5, 10]

nowcast:
  run_name: "feature_extraction_tft_group_pca_v1"
  models:
    - "rolling_mean"
    - "ewma"
    - "ridge"
    - "tft"
  primary_model: "ridge"
  min_train_rows: 1000
  train_window_rows: 2520
  backtest_step_rows: 21

feature_extraction:
  enabled: true
  method: "group_pca"
  apply_to_models: ["ridge", "tft"]
  keep_original_features: false

torch:
  device: "auto"
  max_epochs: 50
  patience: 8
  learning_rate: 0.0005
  weight_decay: 0.001
  restore_best_checkpoint: true

sequence:
  lookback_rows: 63
  batch_size: 128
