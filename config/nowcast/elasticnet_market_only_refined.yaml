task:
  mode: "nowcast"
  estimate_unreleased_only: false

target_features:
  include_lagged_targets: false
  lags: []
  rolling_windows: []
  include_rolling_mean: false
  include_rolling_volatility: false
  include_rolling_min_max: false
  include_rf_lags: false

availability:
  market_data_lag_rows: 0
  official_factor_lag_rows: 1
  recursive_factor_lags: false
  release_gap_backtest_days: [1, 2, 3, 5, 10]

nowcast:
  run_name: "elasticnet_market_only_refined_v1"
  models:
    - "rolling_mean"
    - "ewma"
    - "ridge"
    - "elasticnet"
  primary_model: "elasticnet"
  min_train_rows: 1000
  train_window_rows: 2520
  backtest_step_rows: 21

models:
  ridge:
    alpha: 10.0
    alpha_grid: [0.1, 1.0, 3.0, 10.0, 30.0, 100.0]
    tune_alpha: true
    validation_window_rows: 252
    scale_features: true
  elasticnet:
    alpha: 0.001
    alpha_grid: [0.0003, 0.0006, 0.001, 0.0015, 0.0022, 0.003, 0.0047, 0.0068, 0.01, 0.015]
    l1_ratio: 0.05
    l1_ratio_grid: [0.05, 0.08, 0.1, 0.15, 0.2]
    max_iter: 75000
    tol: 0.0001
    tune_alpha: true
    tune_l1_ratio: true
    validation_window_rows: 252
    scale_features: true
