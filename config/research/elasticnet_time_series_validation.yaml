task:
  mode: "nowcast"
  estimate_unreleased_only: false

data:
  tickers:
    - "SPY"
    - "VTI"
    - "IWM"
    - "QQQ"
    - "IVE"
    - "IVW"
    - "VBR"
    - "VBK"
    - "IJS"
    - "IJT"
    - "XLF"
    - "XLK"
    - "XLI"
    - "XLY"
    - "XLP"
    - "XLV"
    - "XLE"
    - "XLU"
    - "TLT"
    - "IEF"
    - "SHY"
    - "HYG"
    - "LQD"
    - "GLD"
    - "UUP"
    - "^VIX"
    - "IWN"
    - "IWO"
    - "IWD"
    - "IWF"
    - "IJR"
    - "IJH"
    - "RSP"
    - "SPHQ"
    - "VNQ"
    - "EFA"
    - "EEM"
    - "PDP"

features:
  lookback_windows: [1, 2, 5, 10, 21, 63, 126, 252]
  include_returns: true
  include_log_returns: true
  include_rolling_volatility: true
  include_rolling_volume_features: false
  include_ohlc_features: true
  include_drawdown: true
  drop_raw_ohlcv: true

momentum_features:
  enabled: true

target_features:
  include_lagged_targets: false
  lags: []
  rolling_windows: []
  include_rolling_mean: false
  include_rolling_volatility: false
  include_rolling_min_max: false
  include_rf_lags: false

availability:
  market_data_lag_rows: 0
  official_factor_lag_rows: 1
  recursive_factor_lags: false
  release_gap_backtest_days: [1, 2, 3, 5, 10]

feature_extraction:
  enabled: false
  method: "none"
  apply_to_models: []

nowcast:
  run_name: "elasticnet_time_series_validation_v1"
  models:
    - "elasticnet"
    - "per_factor_elasticnet"
  primary_model: "per_factor_elasticnet"
  min_train_rows: 1000
  train_window_rows: 2520

elasticnet_validation:
  protocols:
    - "sliding"
    - "expanding"
  validation_start_date: "2020-01-01"
  train_window_rows: 2520
  min_train_rows: 1000
  validation_window_rows: 252
  fold_step_rows: 252
  holdout_rows: 252
  vintage_step_rows: 252
  max_vintages: 6
  nonzero_threshold: 1.0e-10
  top_n_features: 50
  fixed_hyperparameters:
    alpha: 0.001
    l1_ratio: 0.05
    max_iter: 50000
    tol: 0.0001
    selection: "cyclic"
    scale_features: true
    tune_alpha: false
    tune_l1_ratio: false

models:
  elasticnet:
    alpha: 0.001
    alpha_grid: [0.001]
    l1_ratio: 0.05
    max_iter: 50000
    tol: 0.0001
    selection: "cyclic"
    tune_alpha: false
    tune_l1_ratio: false
    validation_window_rows: 252
    scale_features: true
  per_factor_elasticnet:
    alpha: 0.001
    alpha_grid: [0.001]
    l1_ratio: 0.05
    max_iter: 50000
    tol: 0.0001
    selection: "cyclic"
    tune_alpha: false
    tune_l1_ratio: false
    validation_window_rows: 252
    scale_features: true
