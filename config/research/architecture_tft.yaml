features:
  lookback_windows: [1, 2, 5, 10, 21, 63, 126, 252]

momentum_features:
  enabled: true

feature_extraction:
  enabled: true
  method: "group_pca"
  apply_to_models: ["tft"]
  keep_original_features: false

sequence:
  lookback_rows: 252
  batch_size: 128
  num_workers: 0

torch:
  device: "auto"
  max_epochs: 25
  patience: 5
  learning_rate: 0.0005
  weight_decay: 0.001
  restore_best_checkpoint: true

nowcast:
  run_name: "architecture_tft_v1"
  models:
    - "rolling_mean"
    - "ewma"
    - "tft"
  primary_model: "tft"
  min_train_rows: 1000
  train_window_rows: 2520
  backtest_step_rows: 63

backtest:
  n_jobs: 1

models:
  tft:
    hidden_size: 64
    n_heads: 4
    lstm_layers: 1
    dropout: 0.25
